name: Entry-Level SWE Job Scraper

on:
  schedule:
    # Eastern Time (EDT = UTC-4). Active window: 8am–11pm ET only.
    # Overnight (11pm–8am ET) is skipped — all overnight jobs are batched
    # into the 8am run automatically.
    #
    # 8am–midnight ET  = 12:00–04:00 UTC  (wraps past midnight, split into 2 lines)
    - cron: "0 12-23 * * *"   # 8am – 7pm ET  (12:00–23:00 UTC)
    - cron: "0 0-3 * * *"     # 8pm – 11pm ET  (00:00–03:00 UTC)
  workflow_dispatch:           # lets you trigger a manual run from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to commit cache + excel back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env from secrets
        run: |
          cat > .env << EOF
          TAVILY_API_KEY=${{ secrets.TAVILY_API_KEY }}
          ADZUNA_APP_ID=${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY=${{ secrets.ADZUNA_APP_KEY }}
          RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL=${{ secrets.NOTIFY_EMAIL }}
          EOF

      - name: Run scraper
        run: python main.py --notify-email --max-age-hours 0 --concurrency 30

      - name: Commit updated cache and Excel
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/discovered_boards.json data/emailed_urls.json output/entry_roles.xlsx || true
          git diff --staged --quiet || git commit -m "chore: update jobs [skip ci]"
          git push
