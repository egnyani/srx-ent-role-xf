            - paragraph [ref=e105]:
              - strong [ref=e106]: Required
            - list [ref=e107]:
              - listitem [ref=e108]: Bachelor’s degree in Supply Chain, Logistics, Business, or related field (or equivalent experience)
            - list [ref=e109]:
              - listitem [ref=e110]: 1–3 years of experience in logistics, transportation, fulfillment, or e-commerce operations
            - list [ref=e111]:
              - listitem [ref=e112]: Experience working with parcel carriers and shipment tracking systems
            - list [ref=e113]:
              - listitem [ref=e114]: Strong analytical skills and comfort working with large data sets
            - list [ref=e115]:
              - listitem [ref=e116]: High attention to detail and strong follow-through
            - paragraph [ref=e117]:
