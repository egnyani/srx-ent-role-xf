            - list [ref=e121]:
              - listitem [ref=e122]: Familiarity with Order Management Systems (OMS), Transportation Management Systems (TMS), or carrier portals
            - list [ref=e123]:
              - listitem [ref=e124]: Experience with carrier performance metrics and service level management
