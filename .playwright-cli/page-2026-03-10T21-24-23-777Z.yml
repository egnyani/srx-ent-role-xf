            - paragraph [ref=e51]:
              - strong [ref=e52]: Position Summary
            - paragraph [ref=e53]: The DTC Fulfillment Analyst is responsible for monitoring and improving end-to-end Order-to-Porch performance for direct-to-consumer shipments. This role reviews daily shipment and tracking data, proactively manages delivery exceptions, and drives accountability and corrective actions with parcel carriers and DC operations partners to ensure a fast, reliable, and positive consumer delivery experience.
            - paragraph [ref=e54]: The ideal candidate is highly detail-oriented, data-driven, and comfortable working cross-functionally with carriers, customer service, and internal operations teams to resolve delays, prevent recurring delivery issues and striving for a superior customer experience everyday.
            - paragraph [ref=e55]
            - paragraph [ref=e56]:
              - strong [ref=e57]: Key Responsibilities
            - paragraph [ref=e58]:
              - strong [ref=e59]: Order-to-Porch Performance
            - list [ref=e60]:
              - listitem [ref=e61]: Monitor daily DTC shipment activity and tracking status to ensure on-time delivery performance.
            - list [ref=e62]:
              - listitem [ref=e63]: Identify at-risk, delayed, or stalled shipments and take proactive action to resolve issues.
            - list [ref=e64]:
              - listitem [ref=e65]: Track and report Order-to-Porch lead time performance against service level targets.
            - list [ref=e66]:
              - listitem [ref=e67]: Present ideas for Order-to-Porch lead time improvements for alignment and implementation.
            - paragraph [ref=e68]:
              - strong [ref=e69]: Carrier Management & Accountability
            - list [ref=e70]:
              - listitem [ref=e71]: Act as a primary point of contact for parcel carriers regarding delivery delays, exceptions, and service failures.
            - list [ref=e72]:
              - listitem [ref=e73]: Drive carrier accountability through root-cause analysis, follow-ups, and corrective action requests.
            - list [ref=e74]:
              - listitem [ref=e75]: Escalate recurring issues and support carrier performance reviews with data and insights.
            - paragraph [ref=e76]:
              - strong [ref=e77]: Exception Management
            - list [ref=e78]:
              - listitem [ref=e79]:
                - text: Investigate delivery exceptions including
                - strong [ref=e80]
                - text: pickup and in-transit
                - strong [ref=e81]
                - text: delays, misroutes, failed delivery attempts, and lost or damaged shipments.
            - list [ref=e82]:
              - listitem [ref=e83]: Coordinate resolutions with carriers, fulfillment centers, and customer service teams.
            - list [ref=e84]:
              - listitem [ref=e85]: Ensure timely and accurate updates are communicated to internal stakeholders.
            - paragraph [ref=e86]:
              - strong [ref=e87]: Consumer Experience Support
            - list [ref=e88]:
              - listitem [ref=e89]: Partner with Customer Experience teams to minimize consumer impact from delivery delays.
            - list [ref=e90]:
              - listitem [ref=e91]: Support post-purchase experience by ensuring shipment issues are resolved quickly and accurately.
            - list [ref=e92]:
              - listitem [ref=e93]: Identify trends that negatively impact consumer satisfaction and recommend process improvements.
            - paragraph [ref=e94]:
              - strong [ref=e95]: Reporting & Continuous Improvement
            - list [ref=e96]:
              - listitem [ref=e97]: Maintain dashboards and reports related to shipment status, delivery performance, and carrier KPIs.
            - list [ref=e98]:
              - listitem [ref=e99]: Analyze trends to identify opportunities to improve speed, reliability, and cost.
            - list [ref=e100]:
              - listitem [ref=e101]: Support continuous improvement initiatives focused on reducing delivery delays and exceptions.
            - paragraph [ref=e102]
            - paragraph [ref=e103]:
