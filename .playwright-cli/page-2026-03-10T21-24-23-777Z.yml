              - strong [ref=e24]: About Us
            - paragraph [ref=e25]:
              - text: SharkNinja is a global product design and technology company, with a diversified portfolio of 5-star rated lifestyle solutions that positively impact people’s lives in homes around the world.
              - strong [ref=e26]: Powered by two trusted, global brands, Shark and Ninja
              - text: ", the company has a proven track record of bringing disruptive innovation to market and developing one consumer product after another has allowed SharkNinja to enter multiple product categories, driving significant growth and market share gains. Headquartered in Needham, Massachusetts with more than 4,100 associates, the company’s products are sold at key retailers, online and offline, and through distributors around the world."
