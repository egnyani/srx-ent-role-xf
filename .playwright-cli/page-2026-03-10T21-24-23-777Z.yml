            - paragraph [ref=e42]
            - paragraph [ref=e43]: At SharkNinja, our purpose is to positively impact people’s lives every day in every home around the world! We work very hard to provide our consumers with high quality, exciting products that make life easier. We thrive on passion and innovation, and are looking for great people, with great ideas, who want to build the next big thing and develop while they do. At SharkNinja, Diversity, Equity, and Inclusion is vital to our global success. Valuing each unique voice and blending all of our diverse skills strengthens SharkNinja’s innovation every day. We support ALL of our associates in bringing their authentic selves to work, making an impact, and having the opportunity for career acceleration. With help from our leadership, associates, and our community, we aim to have equity be a key component of the SharkNinja DNA.
            - paragraph [ref=e44]
            - paragraph [ref=e45]:
